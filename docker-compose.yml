name: legalops

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legalops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legalops
      POSTGRES_USER: legalops
      POSTGRES_PASSWORD: legalops_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalops"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legalops-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: legalops-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollamadata:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalops-api
    restart: unless-stopped
    ports:
      - "8079:8079"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://legalops:legalops_secret_2024@postgres:5432/legalops
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalops-celery-worker
    restart: unless-stopped
    command: >
      celery -A src.infrastructure.queue.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q legalops.pipeline,legalops.ingestion,legalops.monitoring,legalops.default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://legalops:legalops_secret_2024@postgres:5432/legalops
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalops-celery-beat
    restart: unless-stopped
    command: >
      celery -A src.infrastructure.queue.celery_app beat
      --loglevel=info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalops-flower
    restart: unless-stopped
    command: >
      celery -A src.infrastructure.queue.celery_app flower
      --port=5555
      --broker_api=redis://redis:6379/0
    ports:
      - "5556:5555"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legalops-migrations
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://legalops:legalops_secret_2024@postgres:5432/legalops
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: legalops-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: legalops2024
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: legalops-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  tempo:
    image: grafana/tempo:2.5.0
    container_name: legalops-tempo
    restart: unless-stopped
    ports:
      - "3201:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempodata:/tmp/tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]

  loki:
    image: grafana/loki:3.1.0
    container_name: legalops-loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]

  langfuse:
    image: langfuse/langfuse:2
    container_name: legalops-langfuse
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://legalops:legalops_secret_2024@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: legalops-langfuse-secret-2024
      SALT: legalops-langfuse-salt-42
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  ollamadata:
  grafanadata:
  promdata:
  tempodata:
  lokidata:
