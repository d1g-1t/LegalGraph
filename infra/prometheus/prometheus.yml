global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "legalops-api"
    metrics_path: "/api/v1/health/metrics"
    static_configs:
      - targets: ["api:8079"]
        labels:
          service: "legalops-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
