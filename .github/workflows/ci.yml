name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: legalops_test
          POSTGRES_USER: legalops
          POSTGRES_PASSWORD: legalops_secret_2024
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U legalops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://legalops:legalops_secret_2024@localhost:5433/legalops_test
          TEST_REDIS_URL: redis://localhost:6380/1
          PASETO_SECRET_KEY: ci-test-secret-key-must-be-at-least-32-bytes-long!!
          ENVIRONMENT: test
        run: pytest tests/integration/ -v --tb=short

      - name: Run tests with coverage
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://legalops:legalops_secret_2024@localhost:5433/legalops_test
          TEST_REDIS_URL: redis://localhost:6380/1
          PASETO_SECRET_KEY: ci-test-secret-key-must-be-at-least-32-bytes-long!!
          ENVIRONMENT: test
        run: pytest tests/ --cov=src --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t legalops-ai-pipeline:ci .

      - name: Verify image
        run: docker run --rm legalops-ai-pipeline:ci python -c "import src; print('OK')"
